name: "Release"

# Triggers on any tag push matching v1.0.0, v0.1.0-beta, etc.
#   git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"
  # Lets you trigger a build manually from the Actions tab without tagging,
  # useful for testing this workflow itself.
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"   # Apple Silicon (arm64) .dmg / .app
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"   # Intel (x64) .dmg / .app
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"   # .AppImage / .deb / .rpm
            args: ""
          - platform: "windows-latest" # .msi / .exe (NSIS)
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Speeds up repeat CI runs significantly — Rust compiles are the
      # slowest part of this pipeline.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RequestKit ${{ github.ref_name }}"
          releaseBody: "See the assets below to download for Windows, macOS, or Linux."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
